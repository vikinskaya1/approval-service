version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: approval
      POSTGRES_PASSWORD: approval
      POSTGRES_DB: approval_service
    ports:
      - "5432:5432"
    volumes:
      - approval_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U approval -d approval_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://approval:approval@db:5432/approval_service
      APP_ENV: local
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  approval_pgdata:
